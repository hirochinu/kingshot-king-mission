<script>

var h=React.createElement,useState=React.useState,useMemo=React.useMemo;
var IC={inf:"#ff9500",cav:"#af52de",arc:"#007aff"};

  {v:"tg5tg7",l:"黄金5〜7",b:1.21}
];
var ROSA_LIST=[
  {lv:0,label:"使用していない",sub:"ローザを集結主に使っていない",b:0},
  {lv:1,label:"遠征：ゴールデン・リズム Lv.1",sub:"弓兵ATK +6%",b:6},

  {lv:4,label:"遠征：ゴールデン・リズム Lv.4",sub:"弓兵ATK +24%",b:24},
  {lv:5,label:"遠征：ゴールデン・リズム Lv.5",sub:"弓兵ATK +30%",b:30}
];
var ML=["自集結","行軍①","行軍②","行軍③","行軍④","行軍⑤","行軍⑥"];

function calcW(a,l,c){return (1+a/100)*(1+l/100)*c;}
function findOpt(wI,wC,wA){
  var tot=wI*wI+wC*wC+wA*wA;
  if(!tot) return {inf:34,cav:33,arc:33};
  var fi=wI*wI/tot*100,fc=wC*wC/tot*100,fa=wA*wA/tot*100;
  var inf=Math.round(fi),cav=Math.round(fc),arc=Math.round(fa);
  var diff=100-(inf+cav+arc);
  if(diff!==0){
    var fr=[{k:"inf",f:fi-inf},{k:"cav",f:fc-cav},{k:"arc",f:fa-arc}];
    fr.sort(function(a,b){return diff>0?b.f-a.f:a.f-b.f;});
    if(fr[0].k==="inf")inf+=diff; else if(fr[0].k==="cav")cav+=diff; else arc+=diff;
  }
  inf=Math.max(0,inf);cav=Math.max(0,cav);arc=Math.max(0,arc);
  if(inf<0){arc+=inf;inf=0;} if(cav<0){arc+=cav;cav=0;} if(arc<0){inf+=arc;arc=0;}
  return {inf:inf,cav:cav,arc:arc};
}

function parseBonus(txt){
  var res={};
  var km={"歩兵攻撃力":"infAtk","歩兵攻擊力":"infAtk","歩兵殺傷力":"infLet","騎兵攻撃力":"cavAtk","騎兵攻擊力":"cavAtk","騎兵殺傷力":"cavLet","弓兵攻撃力":"arcAtk","弓兵攻擊力":"arcAtk","弓兵殺傷力":"arcLet"};
  var lines=txt.split(/\n|\r/).map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  for(var i=0;i<lines.length;i++){
    var line=lines[i],fld=km[line];
    if(fld&&res[fld]==null){
      if(i>0){var m=lines[i-1].match(/(\d+\.?\d*)/);if(m){res[fld]=parseFloat(m[1]);continue;}}
      if(i+1<lines.length){var m2=lines[i+1].match(/(\d+\.?\d*)/);if(m2){res[fld]=parseFloat(m2[1]);continue;}}
    }
    var parts=line.split("\t");
    if(parts.length>=2){
      var fA=km[parts[0].trim()];
      if(fA&&res[fA]==null){var mA=parts[1].match(/(\d+\.?\d*)/);if(mA){res[fA]=parseFloat(mA[1]);continue;}}
      var fB=km[parts[1].trim()];
      if(fB&&res[fB]==null){var mB=parts[0].match(/(\d+\.?\d*)/);if(mB){res[fB]=parseFloat(mB[1]);continue;}}
    }
  }
  return res;
}

function parseTroops(txt){
  var res={};
  var km={"切り札歩兵":"inf","切り札騎兵":"cav","切り札弓兵":"arc","切 札歩兵":"inf","切 札騎兵":"cav","切 札弓兵":"arc","歩兵":"inf","騎兵":"cav","弓兵":"arc"};
  var lines=txt.split(/\n|\r/).map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    for(var key in km){
      var fld=km[key];
      if(line.indexOf(key)!==-1&&res[fld]==null){
        if(i+1<lines.length){var m=lines[i+1].match(/[\d,]+/);if(m){res[fld]=parseInt(m[0].replace(/,/g,""));break;}}
        var m2=line.replace(key,"").match(/[\d,]+/);
        if(m2) res[fld]=parseInt(m2[0].replace(/,/g,""));
        break;
      }
    }
  }
  return res;
}

function fmt(n){return Math.round(Math.abs(n)).toLocaleString();}

function GuideAccordion(props){
  var label=props.label,steps=props.steps,color=props.color||"#007aff";
  var so=React.useState(false);var open=so[0],setOpen=so[1];
  return h("div",{style:{marginBottom:8}},
    h("div",{onClick:function(){setOpen(!open);},style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderRadius:open?"12px 12px 0 0":12,background:"rgba(118,118,128,.1)",cursor:"pointer"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("div",{style:{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}),
        h("span",{style:{fontSize:13,fontWeight:600,color:"#000"}},label)
      ),
      h("span",{style:{fontSize:12,color:"#8e8e93"}},open?"▲":"▼")
    ),
    open&&h("div",{style:{background:"rgba(118,118,128,.06)",borderRadius:"0 0 12px 12px",padding:"10px 14px"}},
      steps.map(function(g){
        return h("div",{key:g.n,className:"guide-step"},
          h("div",{className:"guide-num",style:{background:color}},g.n),
          h("div",null,
            h("div",{className:"guide-text"},g.t),
            g.s&&h("div",{className:"guide-sub"},g.s),
            g.link&&h("a",{href:g.link.href,target:"_blank",rel:"noopener",style:{display:"inline-block",marginTop:4,fontSize:12,color:color,fontWeight:600}},g.link.label+" →")
          )
        );
      })
    )
  );
}

function Stepper(props){
  var step=props.step,labels=props.labels;
  return h("div",{style:{display:"flex",alignItems:"flex-start",marginBottom:20}},
    labels.map(function(lb,i){
      var done=i<step,active=i===step,isLast=i===labels.length-1;
      return h("div",{key:i,style:{display:"flex",alignItems:"flex-start",flex:isLast?"none":1}},
        h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}},
          h("div",{style:{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:done?"#007aff":active?"rgba(0,122,255,.15)":"rgba(118,118,128,.15)",color:done?"#fff":active?"#007aff":"#8e8e93",boxShadow:done?"0 2px 8px rgba(0,122,255,.35)":"none"}},done?"✓":String(i+1)),
          h("div",{style:{fontSize:10,color:active?"#007aff":"#8e8e93",fontWeight:active?600:400,whiteSpace:"nowrap"}},lb)
        ),
        !isLast&&h("div",{style:{flex:1,height:1.5,background:done?"#007aff":"rgba(118,118,128,.2)",marginTop:12,marginLeft:4,marginRight:4}})
      );
    })
  );
}

function PasteBonus(props){
  var onResult=props.onResult;
  var st=useState(""),sr=useState(null);
  var txt=st[0],setTxt=st[1],result=sr[0],setResult=sr[1];
  function handle(val){
    setTxt(val);
    if(!val.trim()){setResult(null);return;}
    var parsed=parseBonus(val),found=Object.keys(parsed).length;
    setResult({parsed:parsed,found:found});
    if(found>0) onResult(parsed);
  }
  var p=result&&result.parsed||{};
  var fields=[
    {key:"infAtk",lb:"歩兵ATK",col:IC.inf,bg:IB.inf},{key:"infLet",lb:"歩兵殺傷",col:IC.inf,bg:IB.inf},
    {key:"cavAtk",lb:"騎兵ATK",col:IC.cav,bg:IB.cav},{key:"cavLet",lb:"騎兵殺傷",col:IC.cav,bg:IB.cav},
    {key:"arcAtk",lb:"弓兵ATK",col:IC.arc,bg:IB.arc},{key:"arcLet",lb:"弓兵殺傷",col:IC.arc,bg:IB.arc}
  ];
  return h("div",null,
    h("div",{style:{background:"rgba(0,122,255,.07)",borderRadius:14,padding:"14px 16px",marginBottom:12}},
      h("p",{style:{fontSize:13,fontWeight:600,color:"#007aff",marginBottom:10}},"📋 テキストの取得方法"),
      h(GuideAccordion,{label:"iOS",color:"#007aff",steps:[
        {n:1,t:"野獣狩猟の戦闘結果メールを開く",s:"熊集結主に使う英雄で野獣狩りをした戦闘の結果メールを使用。最下部までスクロールしてボーナス詳細を表示"},
        {n:2,t:"ボーナス詳細画面のスクショを撮る",s:""},
        {n:3,t:"スクショから文字を長押し →「すべてを選択」→「コピー」",s:"クリップボードにコピーされます"},
        {n:4,t:"下のエリアに貼り付け",s:"自動でステータスを読み取ります"}
      ]}),
      h(GuideAccordion,{label:"Android",color:"#34c759",steps:[
        {n:1,t:"野獣狩猟の戦闘結果メールを開く",s:"熊集結主に使う英雄で野獣狩りをした戦闘の結果メールを使用。最下部までスクロールしてボーナス詳細を表示"},
        {n:2,t:"ボーナス詳細画面のスクショを撮る",s:""},
        {n:3,t:"Googleレンズでスクショを読み取る",s:"",link:{href:"https://lens.google.com",label:"Googleレンズを開く"}},
        {n:4,t:"「テキスト」タブ →「すべてを選択」→「コピー」",s:"画面内の文字がすべて選択されます"},
        {n:5,t:"下のエリアに貼り付け",s:"自動でステータスを読み取ります"}
      ]})
    ),
        h("textarea",{className:"paste-box",value:txt,placeholder:"👆 ここに貼り付け",onChange:function(e){handle(e.target.value);}}),
    result&&result.found>0&&h("div",null,
      h("div",{className:"toast toast-ok"},"✓ "+result.found+"/6項目を読み取りました"),
      h("div",{className:"preview-grid"},
        fields.map(function(f){var val=p[f.key];return h("div",{key:f.key,className:"preview-cell",style:{background:val!=null?f.bg:"rgba(118,118,128,.08)"}},h("div",{className:"preview-val",style:{color:val!=null?f.col:"#c7c7cc"}},val!=null?val.toFixed(1):"—"),h("div",{className:"preview-lbl",style:{color:val!=null?f.col:"#c7c7cc"}},f.lb));})
      )
    ),
    result&&result.found===0&&h("div",{className:"toast toast-err"},"✗ 数値を検出できませんでした"),
    result&&result.found>0&&result.found<6&&h("div",{className:"toast toast-warn"},"⚠️ "+result.found+"/6項目のみ読み取れました")
  );
}

function ToolHost(props){
  var onBack=props.onBack;
  var ss=useState(0);var step=ss[0],setStep=ss[1];
  var s1=useState(""),s2=useState(""),s3=useState(""),s4=useState(""),s5=useState(""),s6=useState("");
  var infAtk=s1[0],setIA=s1[1],infLet=s2[0],setIL=s2[1];
  var cavAtk=s3[0],setCA=s3[1],cavLet=s4[0],setCL=s4[1];
  var arcAtk=s5[0],setAA=s5[1],arcLet=s6[0],setAL=s6[1];
  var st=useState("tg3tg4"),sr=useState(0),sh=useState(false);
  var tier=st[0],setTier=st[1],rosa=sr[0],setRosa=sr[1],huntingDance=sh[0],setHuntingDance=sh[1];
  var curT=TIERS.find(function(t){return t.v===tier;})||TIERS[0];
  var rBon=ROSA_LIST[rosa]?ROSA_LIST[rosa].b:0;
  var vIA=parseFloat(infAtk)||0,vIL=parseFloat(infLet)||0;
  var vCA=parseFloat(cavAtk)||0,vCL=parseFloat(cavLet)||0;
  var vAA=parseFloat(arcAtk)||0,vAL=parseFloat(arcLet)||0;
  var arcEff=rBon>0?vAA*(1+rBon/100):vAA;
  var calc=useMemo(function(){
    var wI=calcW(vIA,vIL,1/3),wC=calcW(vCA,vCL,1),wA=calcW(arcEff,vAL,4/3*curT.b);
    var opt=findOpt(wI,wC,wA);
    return {wI:wI,wC:wC,wA:wA,opt:opt,maxW:Math.max(wI,wC,wA,0.0001)};
  },[vIA,vIL,vCA,vCL,arcEff,vAL,curT]);
  function applyParsed(p){
    if(p.infAtk!=null)setIA(String(p.infAtk));if(p.infLet!=null)setIL(String(p.infLet));
    if(p.cavAtk!=null)setCA(String(p.cavAtk));if(p.cavLet!=null)setCL(String(p.cavLet));
    if(p.arcAtk!=null)setAA(String(p.arcAtk));if(p.arcLet!=null)setAL(String(p.arcLet));
  }
  var troops=[
    {em:"🛡️",lb:"歩兵",col:IC.inf,atk:infAtk,setA:setIA,lt:infLet,setL:setIL},
    {em:"🐎",lb:"騎兵",col:IC.cav,atk:cavAtk,setA:setCA,lt:cavLet,setL:setCL},
    {em:"🏹",lb:"弓兵",col:IC.arc,atk:arcAtk,setA:setAA,lt:arcLet,setL:setAL}
  ];
  var opt=calc.opt;
  var hasAll=vIA>0&&vIL>0&&vCA>0&&vCL>0&&vAA>0&&vAL>0;
  var conic="conic-gradient("+IC.inf+" 0% "+opt.inf+"%, "+IC.cav+" "+opt.inf+"% "+(opt.inf+opt.cav)+"%, "+IC.arc+" "+(opt.inf+opt.cav)+"% 100%)";

  return h("div",null,
    h("button",{className:"btn-back",onClick:onBack},"‹ メニューに戻る"),
    h("div",{style:{marginBottom:20}},
      h("h2",{style:{fontSize:20,fontWeight:700,letterSpacing:"-.3px"}},"集結用の最適兵割合"),
      h("p",{style:{fontSize:13,color:"#8e8e93",marginTop:4}},"ボーナス詳細のステータスから最適な兵種比率を計算します")
    ),
    h(Stepper,{step:step,labels:["ステータス入力","兵士・ローザ","結果"]}),

    step===0&&h("div",null,
      h("p",{style:{fontSize:13,fontWeight:600,color:"#6e6e73",marginBottom:4}},"ボーナス詳細ステータス"),
      h("p",{style:{fontSize:12,color:"#8e8e93",marginBottom:8,lineHeight:1.6}},"熊集結主に使う英雄で野獣狩りをした戦闘の結果メール（最下部のボーナス詳細）から入力してください。"),
      h("div",{className:"card"},
        h("p",{className:"sec"},"テキスト貼り付けで自動入力"),
        h(PasteBonus,{onResult:applyParsed}),
        h("div",{className:"sep"}),
        h("p",{className:"sec"},"手動入力 / 確認・修正"),
        troops.map(function(row){
          return h("div",{key:row.lb,style:{marginBottom:14}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:8}},h("span",null,row.em),h("span",{style:{fontSize:15,fontWeight:600,color:row.col}},row.lb)),
            h("div",{style:{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr)",gap:8}},
              h("div",null,h("p",{className:"fl"},"攻撃力"),h("div",{className:"iw"},h("input",{type:"number",value:row.atk,placeholder:"537",onChange:function(ev){row.setA(ev.target.value);},style:{color:row.col}}),h("span",{className:"sfx"},"%"))),
              h("div",null,h("p",{className:"fl"},"殺傷力"),h("div",{className:"iw"},h("input",{type:"number",value:row.lt,placeholder:"368",onChange:function(ev){row.setL(ev.target.value);},style:{color:row.col}}),h("span",{className:"sfx"},"%")))
            )
          );
        }),
        !hasAll&&h("div",{style:{marginTop:8,fontSize:13,color:"#8e8e93",textAlign:"center"}},"6項目すべて入力すると次へ進めます"),
        h("button",{className:"btn"+(hasAll?"":" btn-gray"),disabled:!hasAll,onClick:function(){setStep(1);}},"次へ：兵士の設定　→")
      )

  var nI=parseInt(oI)||0,nC=parseInt(oC)||0,nA=parseInt(oA)||0;

  function applyTroops(p){
    if(p.inf!=null)setOI(String(p.inf));
    if(p.cav!=null)setOC(String(p.cav));
    if(p.arc!=null)setOA(String(p.arc));
  }

  var RAGING_BEAST_BONUSES=[0,1500,3000,4500,6000,7500,9000,10500,12000,13500,15000];
  var calcResult=useMemo(function(){
    if(!nI&&!nC&&!nA) return null;
    var villaBon=villaLv*3000;
    var petBon=RAGING_BEAST_BONUSES[petLv]||0;
    var caps=[];
    for(var i=0;i<march;i++) caps.push((parseInt(mSz[i])||0)+villaBon+petBon);
    if(caps.every(function(c){return !c;})) return null;
    var ratios=[];
    for(var i=0;i<march;i++){
      var pI=Math.min(100,Math.max(0,parseInt(mIP[i])||0));
      var pC=Math.min(100,Math.max(0,parseInt(mCP[i])||0));
      ratios.push({inf:pI,cav:pC,arc:Math.max(0,100-pI-pC)});
    }
    var left={inf:nI,cav:nC,arc:nA};
    var results=[];
    if(mode==="none"){
      for(var i=0;i<march;i++){
        var cap=caps[i];
        if(!cap){results.push(null);continue;}
        var iN=Math.round(cap*ratios[i].inf/100);
        var cN=Math.round(cap*ratios[i].cav/100);
        var aN=Math.max(0,cap-iN-cN);
        results.push({inf:iN,cav:cN,arc:aN,total:iN+cN+aN,cap:cap});
        left.inf-=iN;left.cav-=cN;left.arc-=aN;
      }
    } else if(mode==="even"){
      var n=march;
      for(var i=0;i<march;i++){
        var cap=caps[i];
        if(!cap){results.push(null);n--;continue;}
        var iN=Math.min(Math.round(cap*ratios[i].inf/100),Math.floor(left.inf/Math.max(n,1)));
        var cN=Math.min(Math.round(cap*ratios[i].cav/100),Math.floor(left.cav/Math.max(n,1)));
        var aN=Math.min(Math.round(cap*ratios[i].arc/100),Math.floor(left.arc/Math.max(n,1)));

        // この行軍に入れたい数（比率×容量）と残保有数の小さい方

        var aN=Math.min(Math.round(cap*ratios[i].arc/100),Math.max(0,left.arc));
        results.push({inf:iN,cav:cN,arc:aN,total:iN+cN+aN,cap:cap});
        left.inf-=iN;left.cav-=cN;left.arc-=aN;
      }
    }
